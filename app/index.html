<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Apprendre l'Anglais</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>✈️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Sora',sans-serif;background:var(--bg);color:var(--text)}
:root{
  --bg:#0c0e14;--s1:#13161f;--s2:#191d2d;--s3:#20253a;
  --bd:#282d45;--gold:#e8b84b;--teal:#3ecfb2;--red:#f06b6b;
  --blue:#5b9cf5;--green:#4ade80;--text:#e4e6f2;--muted:#5f6480;
  --r:12px;
}
h1,h2,h3{font-family:'Lora',serif}
button{font-family:'Sora',sans-serif;border:none;cursor:pointer;min-height:44px;border-radius:var(--r)}
.scr{position:absolute;inset:0;height:100dvh;display:flex;flex-direction:column;transition:opacity .3s,transform .3s}
.scr.off{opacity:0;pointer-events:none;transform:translateY(20px)}

/* ══ HOME ══ */
#home{justify-content:center;align-items:center;padding:24px;text-align:center;gap:16px}
#home .logo{font-size:42px}
#home h1{font-size:22px;letter-spacing:-.5px}
.avatar{width:80px;height:80px;border-radius:50%;background:var(--s3);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto}
.quote{color:var(--muted);font-style:italic;font-size:13px;max-width:280px;min-height:36px;line-height:1.5}
.srow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.sc{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:10px 14px;min-width:68px;text-align:center}
.sc .v{font-size:20px;font-weight:700;color:var(--gold)}
.sc .l{font-size:10px;color:var(--muted);margin-top:2px}
.info{font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:4px;align-items:center}
#btnGo{background:var(--gold);color:var(--bg);font-size:16px;font-weight:600;padding:14px 48px;border-radius:28px;margin-top:4px;transition:transform .15s}
#btnGo:active{transform:scale(.96)}

/* ══ SESSION ══ */
#sess{background:var(--bg)}
.hdr{display:flex;align-items:center;padding:12px 16px;background:var(--s1);border-bottom:1px solid var(--bd);gap:10px;flex-shrink:0}
.hdr .bk{background:none;color:var(--muted);font-size:20px;min-height:36px;width:36px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:50%}
.hdr .tt{flex:1;font-family:'Lora',serif;font-size:15px;font-weight:600}
.hdr .tt small{font-weight:400;color:var(--muted);font-size:11px;display:block;font-family:'Sora',sans-serif}
.hdr .hb{background:none;color:var(--muted);font-size:16px;min-height:36px;width:36px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:50%}
.sbar{display:flex;align-items:center;justify-content:center;gap:16px;padding:6px;background:var(--s1);border-bottom:1px solid var(--bd);font-size:11px;color:var(--muted);flex-shrink:0}
.chat{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:85%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.55;animation:mIn .25s ease}
@keyframes mIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.g{align-self:flex-start;background:var(--s2);border:1px solid var(--bd);border-bottom-left-radius:4px}
.msg.u{align-self:flex-end;background:var(--s3);border:1px solid var(--bd);border-bottom-right-radius:4px;color:var(--teal)}
.msg .tag{font-size:10px;font-weight:600;margin-bottom:4px;display:block}
.msg.g .tag{color:var(--gold)}
.msg.u .tag{color:var(--teal)}
.msg .fr{display:block;margin-top:8px;padding:6px 10px;background:rgba(232,184,75,.08);border-radius:8px;font-size:12px;color:var(--gold);font-style:italic}
.msg .voc{display:block;margin-top:4px;font-size:11px;color:var(--teal)}

/* Choices */
.choices{display:flex;flex-direction:column;gap:8px;padding:8px 16px;align-self:stretch}
.cho{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:12px 16px;font-size:14px;color:var(--text);text-align:left;transition:all .15s;min-height:48px}
.cho:active{transform:scale(.98)}
.cho.correct{border-color:var(--green);background:rgba(74,222,128,.1);color:var(--green)}
.cho.wrong{border-color:var(--red);background:rgba(240,107,107,.1);color:var(--red)}
.cho:disabled{opacity:.6;cursor:default}

/* Bottom zone */
.bzone{padding:12px 16px;padding-bottom:env(safe-area-inset-bottom,16px);background:var(--s1);border-top:1px solid var(--bd);flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:8px}
.bzone .status{font-size:12px;color:var(--muted);min-height:18px;text-align:center}
.bzone .acts{display:flex;gap:12px}
.bzone .abtn{background:var(--s2);color:var(--muted);font-size:13px;padding:8px 16px;border-radius:20px;display:flex;align-items:center;gap:4px}
.bzone .abtn.primary{background:var(--gold);color:var(--bg);font-weight:600}

/* Wave */
.wave{display:flex;gap:3px;align-items:center;justify-content:center;height:24px}
.wave span{width:3px;background:var(--gold);border-radius:2px;animation:w .8s ease-in-out infinite}
.wave span:nth-child(2){animation-delay:.1s}
.wave span:nth-child(3){animation-delay:.2s}
.wave span:nth-child(4){animation-delay:.3s}
@keyframes w{0%,100%{height:4px}50%{height:20px}}

/* Progress bar */
.pbar{width:100%;height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.pbar .fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s}

/* Bilan */
.bilan{background:var(--s2);border:1px solid var(--gold);border-radius:var(--r);padding:16px;margin:8px 0}
.bilan h3{font-size:14px;color:var(--gold);margin-bottom:8px}
.bilan .row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid var(--bd)}
.bilan .row:last-child{border:none}
.bilan .row .lb{color:var(--muted)}
.bilan .row .vl{font-weight:600}
.bilan .row .vl.good{color:var(--green)}
.bilan .row .vl.mid{color:var(--gold)}
.bilan .row .vl.bad{color:var(--red)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-bg.show{opacity:1;pointer-events:all}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:24px;width:100%;max-width:380px;max-height:80dvh;overflow-y:auto}
.modal h2{font-size:18px;margin-bottom:12px;color:var(--gold)}
.bar-r{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px}
.bar-l{width:90px;color:var(--muted);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-t{flex:1;height:8px;background:var(--s3);border-radius:4px;overflow:hidden}
.bar-f{height:100%;border-radius:4px;transition:width .4s}
.bar-v{width:30px;text-align:right;font-weight:600;flex-shrink:0}
.mbtn{padding:10px;text-align:center;border-radius:var(--r);font-weight:600;font-size:14px;width:100%;background:var(--gold);color:var(--bg);margin-top:16px}
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div id="home" class="scr">
  <div class="logo">&#9992;&#65039;</div>
  <h1>Apprendre l'Anglais</h1>
  <div class="avatar">&#127802;</div>
  <div class="quote" id="quote"></div>
  <div class="srow">
    <div class="sc"><div class="v" id="hSess">0</div><div class="l">Sessions</div></div>
    <div class="sc"><div class="v" id="hScore">--</div><div class="l">Score</div></div>
    <div class="sc"><div class="v" id="hDays">0</div><div class="l">Jours</div></div>
    <div class="sc"><div class="v" id="hPhase">1</div><div class="l">Phase</div></div>
  </div>
  <div class="info" id="homeInfo"></div>
  <button id="btnGo">&#127919; Commencer</button>
</div>

<!-- ══ SESSION ══ -->
<div id="sess" class="scr off">
  <div class="hdr">
    <button class="bk" id="btnBack">&#8592;</button>
    <div class="tt" id="sessTitle">&#127802; Gusti<small id="sessScene">--</small></div>
    <button class="hb" id="btnStat">&#128202;</button>
  </div>
  <div class="sbar">
    <span>Echange <b id="exN">0</b>/<b id="exT">0</b></span>
    <div class="pbar" style="width:120px"><div class="fill" id="pFill" style="width:0%"></div></div>
    <span id="exScore"></span>
  </div>
  <div class="chat" id="chat"></div>
  <div class="bzone" id="bzone">
    <div class="status" id="status"></div>
    <div class="acts" id="acts"></div>
  </div>
</div>

<!-- Stats modal -->
<div class="modal-bg" id="statsMod">
  <div class="modal">
    <h2>&#128202; Progression</h2>
    <div id="statsBody"></div>
    <button class="mbtn" onclick="document.getElementById('statsMod').classList.remove('show')">Fermer</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// APPRENDRE L'ANGLAIS — Sans IA, 100% local
// ═══════════════════════════════════════════

const STORAGE='anglais_v2';

{

    {g:"We are flying to Denpasar, Bali. The flight time is fourteen hours and thirty minutes.",fr:"Nous volons vers Denpasar, Bali. Le vol dure 14 heures et 30 minutes.",voc:"flying=volons|flight time=duree du vol|hours=heures|minutes=minutes",

     accept:[0], feedback:["Excellent ! Tu as bien compris les chiffres !","Non... thirty-five thousand = 35 000, et ahead of schedule = en avance.","Presque ! L'altitude est bonne mais c'est fifteen = 15, pas fifty = 50."]}

    {g:"Where will you be staying in Bali?",fr:"Ou allez-vous loger a Bali ?",voc:"where=ou|staying=loger",

    {g:"Your visa costs thirty-five US dollars. Or five hundred thousand Indonesian rupiah.",fr:"Votre visa coute 35 dollars americains ou 500 000 roupies indonesiennes.",voc:"costs=coute|dollars=dollars|rupiah=roupies",

{

// ── STATE ──
let stats, curScenario, curStep, sessionScore, sessionTotal, phase;
const QUOTES=["On commence ? J'ai prepare un beau voyage.","Chaque session te rapproche du vrai voyage.","Les erreurs, c'est le chemin.","Bali t'attend. Moi aussi.","Un mot a la fois.","Ready when you are, Dume.","Aujourd'hui on va bien bosser.","C'est en parlant qu'on apprend."];

// ── INIT ──
document.addEventListener('DOMContentLoaded',()=>{
  loadStats();
  updateHome();
  document.getElementById('quote').textContent='« '+QUOTES[Math.floor(Math.random()*QUOTES.length)]+' »';
  document.getElementById('btnGo').onclick=startSession;
  document.getElementById('btnBack').onclick=endSession;
  document.getElementById('btnStat').onclick=()=>{renderStats();document.getElementById('statsMod').classList.add('show')};
});

// ── STATS ──
function defaultStats(){
  const sc={};
  SCENARIOS.forEach(s=>{sc[s.id]={plays:0,scores:[],best:0,last:null}});
  return{sessions:0,days:[],lastSession:null,phase:1,scenarios:sc};
}
function loadStats(){const r=localStorage.getItem(STORAGE);stats=r?JSON.parse(r):defaultStats();SCENARIOS.forEach(s=>{if(!stats.scenarios[s.id])stats.scenarios[s.id]={plays:0,scores:[],best:0,last:null}});phase=stats.phase||1}
function saveStats(){localStorage.setItem(STORAGE,JSON.stringify(stats))}

// ── HOME ──
function updateHome(){
  document.getElementById('hSess').textContent=stats.sessions;
  document.getElementById('hDays').textContent=stats.days.length;
  document.getElementById('hPhase').textContent=stats.phase||1;
  const all=Object.values(stats.scenarios).flatMap(s=>s.scores);
  document.getElementById('hScore').textContent=all.length?Math.round(all.reduce((a,b)=>a+b,0)/all.length)+'%':'--';
  const info=document.getElementById('homeInfo');
  const weak=Object.entries(stats.scenarios).filter(([,v])=>v.scores.length&&v.scores[v.scores.length-1]<60).map(([k])=>SCENARIOS.find(s=>s.id===k)?.name).filter(Boolean);
  let h='';
  if(stats.lastSession)h+=`<span>Derniere session : ${relDate(stats.lastSession)}</span>`;
  if(weak.length)h+=`<span style="color:var(--gold)">A travailler : ${weak.slice(0,2).join(', ')}</span>`;
  info.innerHTML=h;
}
function relDate(iso){const d=Math.floor((Date.now()-new Date(iso))/864e5);return d===0?"aujourd'hui":d===1?'hier':`il y a ${d} jours`}

// ── SESSION ──
function startSession(){
  // Pick scenario: prioritize weak ones, then unplayed, then random
  const weak=SCENARIOS.filter(s=>{const st=stats.scenarios[s.id];return st.scores.length&&st.scores[st.scores.length-1]<60});
  const unplayed=SCENARIOS.filter(s=>!stats.scenarios[s.id].plays);
  const pool=weak.length?weak:unplayed.length?unplayed:SCENARIOS;
  curScenario=pool[Math.floor(Math.random()*pool.length)];
  curStep=0;sessionScore=0;sessionTotal=0;

  document.getElementById('home').classList.add('off');
  document.getElementById('sess').classList.remove('off');
  document.getElementById('sessScene').textContent=curScenario.name;
  document.getElementById('chat').innerHTML='';
  document.getElementById('exN').textContent='0';
  document.getElementById('exT').textContent=curScenario.steps.length;
  document.getElementById('exScore').textContent='';
  document.getElementById('pFill').style.width='0%';

  playStep();
}

function playStep(){
  if(curStep>=curScenario.steps.length){showBilan();return}
  const step=curScenario.steps[curStep];
  const chat=document.getElementById('chat');

  // Gusti message
  const gEl=document.createElement('div');gEl.className='msg g';
  let gh=`<span class="tag">&#127802; GUSTI</span>${esc(step.g)}`;
  if(step.fr)gh+=`<span class="fr">${esc(step.fr)}</span>`;
  if(step.voc)gh+=`<span class="voc">${step.voc.split('|').join(' &middot; ')}</span>`;
  gEl.innerHTML=gh;chat.appendChild(gEl);

  // Question if different from main text
  if(step.q){
    setTimeout(()=>{
      const qEl=document.createElement('div');qEl.className='msg g';
      qEl.innerHTML=`<span class="tag">&#127802; GUSTI</span>${esc(step.q)}`;
      if(step.qfr)qEl.innerHTML+=`<span class="fr">${esc(step.qfr)}</span>`;
      chat.appendChild(qEl);
      scroll();
      speak(step.q,()=>showChoices(step));
    },800);
  } else {
    showChoices(step);
  }

  // Speak
  speak(step.g,step.q?null:()=>showChoices(step));
  document.getElementById('exN').textContent=curStep+1;
  document.getElementById('pFill').style.width=((curStep+1)/curScenario.steps.length*100)+'%';
  scroll();
}

function showChoices(step){
  const zone=document.getElementById('bzone');
  document.getElementById('status').textContent='Choisis ta reponse :';
  const acts=document.getElementById('acts');
  acts.innerHTML='';

  // Create choice buttons in chat
  const chat=document.getElementById('chat');
  const cDiv=document.createElement('div');cDiv.className='choices';
  step.choices.forEach((c,i)=>{
    const btn=document.createElement('button');btn.className='cho';btn.textContent=c;
    btn.onclick=()=>handleChoice(step,i,cDiv);
    cDiv.appendChild(btn);
  });
  chat.appendChild(cDiv);
  scroll();
}

function handleChoice(step,idx,cDiv){
  const btns=cDiv.querySelectorAll('.cho');
  btns.forEach(b=>b.disabled=true);
  sessionTotal++;

  const isCorrect=step.accept.includes(idx);
  if(isCorrect){sessionScore++;btns[idx].classList.add('correct')}
  else{btns[idx].classList.add('wrong');btns[step.accept[0]].classList.add('correct')}

  // User message
  const chat=document.getElementById('chat');
  const uEl=document.createElement('div');uEl.className='msg u';
  uEl.innerHTML=`<span class="tag">DUME</span>${esc(step.choices[idx])}`;
  chat.appendChild(uEl);

  // Feedback
  setTimeout(()=>{
    const fb=step.feedback[idx]||step.feedback[0];
    const fEl=document.createElement('div');fEl.className='msg g';
    fEl.innerHTML=`<span class="tag">&#127802; GUSTI</span>${esc(fb)}`;
    chat.appendChild(fEl);
    speak(isCorrect?fb:'');
    scroll();

    // Update score display
    document.getElementById('exScore').textContent=Math.round(sessionScore/sessionTotal*100)+'%';

    // Next step
    setTimeout(()=>{curStep++;playStep()},2000);
  },600);

  scroll();
}

// ── BILAN ──
function showBilan(){
  const pct=sessionTotal?Math.round(sessionScore/sessionTotal*100):0;
  const chat=document.getElementById('chat');

  const b=document.createElement('div');b.className='bilan';
  let cl=pct>=80?'good':pct>=50?'mid':'bad';
  b.innerHTML=`<h3>&#127802; Bilan de session</h3>
    <div class="row"><span class="lb">Scenario</span><span class="vl">${curScenario.name}</span></div>
    <div class="row"><span class="lb">Score</span><span class="vl ${cl}">${pct}%</span></div>
    <div class="row"><span class="lb">Bonnes reponses</span><span class="vl">${sessionScore}/${sessionTotal}</span></div>
    <div class="row"><span class="lb">Phase</span><span class="vl">${phase}</span></div>
    <div class="row"><span class="lb">${pct>=80?'Bravo ! Continue comme ca.':pct>=50?'Pas mal. On va retravailler les points faibles.':'On va reprendre ca ensemble. Pas de stress.'}</span></div>`;
  chat.appendChild(b);
  scroll();

  // Speak bilan
  const msg=pct>=80?"Great job today! You did really well.":pct>=50?"Not bad! We will work on the weak points next time.":"Don't worry. We will practice this again. You are making progress.";
  speak(msg);

  // Save stats
  const sid=curScenario.id;
  stats.scenarios[sid].plays++;
  stats.scenarios[sid].scores.push(pct);
  if(pct>stats.scenarios[sid].best)stats.scenarios[sid].best=pct;
  stats.scenarios[sid].last=new Date().toISOString();
  stats.sessions++;
  stats.lastSession=new Date().toISOString();
  const today=new Date().toISOString().slice(0,10);
  if(!stats.days.includes(today))stats.days.push(today);

  // Auto-adapt phase
  const allScores=Object.values(stats.scenarios).flatMap(s=>s.scores);
  const avg=allScores.length?allScores.reduce((a,b)=>a+b,0)/allScores.length:0;
  if(avg>=85&&stats.sessions>=12)stats.phase=Math.min(4,Math.max(stats.phase,4));
  else if(avg>=75&&stats.sessions>=8)stats.phase=Math.min(3,Math.max(stats.phase,3));
  else if(avg>=60&&stats.sessions>=4)stats.phase=Math.min(2,Math.max(stats.phase,2));
  phase=stats.phase;

  saveStats();
  syncGitHub();

  // Show continue button
  document.getElementById('status').textContent='';
  const acts=document.getElementById('acts');
  acts.innerHTML='';
  const btn1=document.createElement('button');btn1.className='abtn primary';btn1.textContent='Continuer';btn1.onclick=()=>{curStep=0;sessionScore=0;sessionTotal=0;startSession()};
  const btn2=document.createElement('button');btn2.className='abtn';btn2.textContent='Terminer';btn2.onclick=goHome;
  acts.appendChild(btn1);acts.appendChild(btn2);
}

function endSession(){goHome()}
function goHome(){
  document.getElementById('sess').classList.add('off');
  document.getElementById('home').classList.remove('off');
  updateHome();
}

// ── TTS ──
function speak(text,cb){
  if(!('speechSynthesis' in window)){if(cb)cb();return}
  speechSynthesis.cancel();
  const clean=text.replace(/\[.*?\]/g,'').trim();
  if(!clean){if(cb)cb();return}
  const u=new SpeechSynthesisUtterance(clean);
  u.lang='en-US';
  const rates={1:.75,2:.95,3:1.1,4:1.25};
  u.rate=rates[phase]||.85;
  const voices=speechSynthesis.getVoices();
  const v=voices.find(v=>v.lang==='en-US'&&v.name.includes('Samantha'))||voices.find(v=>v.lang.startsWith('en'));
  if(v)u.voice=v;
  u.onend=()=>{if(cb)cb()};
  u.onerror=()=>{if(cb)cb()};
  speechSynthesis.speak(u);
}
// iOS voice fix
if('speechSynthesis' in window){speechSynthesis.onvoiceschanged=()=>{};setInterval(()=>{if(speechSynthesis.speaking){speechSynthesis.pause();speechSynthesis.resume()}},10000)}

// ── GITHUB SYNC ──
function syncGitHub(){
  const token=localStorage.getItem('gh_token');
  if(!token)return;
  const repo='dume2309/Apprendre-l-Anglais',path='suivi/progression.json';
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(stats,null,2))));
  fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github.v3+json'}})
  .then(r=>r.ok?r.json():{}).then(existing=>{
    fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{method:'PUT',headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:`Auto-sync ${new Date().toLocaleDateString('fr-FR')}`,content,...(existing.sha&&{sha:existing.sha})})
    }).catch(()=>{});
  }).catch(()=>{});
}

// ── STATS MODAL ──
function renderStats(){
  const b=document.getElementById('statsBody');
  const all=Object.values(stats.scenarios).flatMap(s=>s.scores);
  const avg=all.length?Math.round(all.reduce((a,b)=>a+b,0)/all.length):0;
  let h=`<div class="bar-r"><span class="bar-l">Score moyen</span><div class="bar-t"><div class="bar-f" style="width:${avg}%;background:${avg>=70?'var(--green)':avg>=50?'var(--gold)':'var(--red)'}"></div></div><span class="bar-v">${avg}%</span></div>`;
  h+=`<div style="font-size:11px;color:var(--muted);margin:8px 0">${stats.sessions} sessions | ${stats.days.length} jours | Phase ${stats.phase}</div>`;
  SCENARIOS.forEach(s=>{
    const st=stats.scenarios[s.id];if(!st.plays)return;
    const sc=st.scores.length?st.scores[st.scores.length-1]:0;
    h+=`<div class="bar-r"><span class="bar-l">${s.name}</span><div class="bar-t"><div class="bar-f" style="width:${sc}%;background:${sc>=70?'var(--green)':sc>=50?'var(--gold)':'var(--red)'}"></div></div><span class="bar-v">${sc}%</span></div>`;
  });
  b.innerHTML=h;
}

// ── UTILS ──
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function scroll(){const c=document.getElementById('chat');requestAnimationFrame(()=>c.scrollTop=c.scrollHeight)}
</script>
